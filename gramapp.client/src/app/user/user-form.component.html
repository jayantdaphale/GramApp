<div class="form-tray">
  <div class="form-heading">
    <h3>{{ isUpdate ? 'Edit User' : 'Add User' }}</h3>
    <button type="button" class="ghost-action" (click)="cancel()">Cancel</button>
  </div>

  <div class="form-grid">
    <label>
      <span>Email</span>
      <input type="email" [(ngModel)]="model.email" />
    </label>
    <label *ngIf="!isUpdate">
      <span>Password</span>
      <input type="password" [(ngModel)]="model.password" />
    </label>
    <label>
      <span>Company</span>
      <select appSelect2 select2Placeholder="Select company" [(ngModel)]="model.companyId">
        <option value=""></option>
        <option *ngFor="let company of companies" [value]="company.id">{{ company.name }}</option>
      </select>
    </label>
    <label *ngIf="!model.isSuperAdmin">
      <span>Menu access</span>
      <select appSelect2 select2Placeholder="Select menu access" [(ngModel)]="model.menuAccessId">
        <option value=""></option>
        <option *ngFor="let access of menuAccesses" [value]="access.id">{{ access.name }}</option>
      </select>
    </label>
    <label class="check-field">
      <input type="checkbox" [(ngModel)]="model.isSuperAdmin" />
      <span>Super admin access</span>
    </label>
  </div>

  <p class="form-error" *ngIf="error">{{ error }}</p>

  <div class="form-actions">
    <button type="button" class="save-action" (click)="save()">{{ isUpdate ? 'Update' : 'Create' }}</button>
  </div>
</div>
